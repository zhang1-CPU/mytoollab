 <div class="section">
 <h2>How it works</h2>
 <ol class="steps">
 <li>Paste JSON or JSON5-style text into the Input panel. JSON5 relaxes strict rules: single-quoted strings, trailing commas, comments, and unquoted keys are all accepted.</li>
 <li>Click Format to beautify; click Minify for a compact one-liner. Switch to Tree view to collapse nested objects and arrays.</li>
 <li>Enter a JSONPath expression (e.g. <code>$.store.book[0].title</code>, <code>$..price</code>) to filter values; matched nodes are highlighted.</li>
 <li>Copy or Download the final JSON &mdash; all processing happens in your browser; nothing is uploaded.</li>
 </ol>
 </div>

 <section class="tool-info" aria-label="Tool information">
  <h2>What is JSON Formatter?</h2>
  <p>A JSON formatter validates, beautifies, and prettifies JSON data. It checks for syntax errors, formats the structure with proper indentation, and can minify JSON for production use. An everyday essential for developers debugging APIs and configs.</p>

  <h2>How to use</h2>
  <ol class="steps-list">
<li>Step 1: Paste JSON data into the editor.</li>
<li>Step 2: Choose strict or JSON5 (loose) parsing.</li>
<li>Step 3: Click Format to beautify, or Minify to compress.</li>
<li>Step 4: Explore with Tree view or query with JSONPath, then Copy or Download.</li>
  </ol>

  <h2>Use cases</h2>
  <ul class="usecase-list">
<li>Debugging JSON responses from APIs.</li>
<li>Formatting configuration files and data exports.</li>
<li>Validating JSON syntax before deployment.</li>
<li>Comparing JSON structures between different sources.</li>
<li>Drilling into large JSON with JSONPath queries.</li>
  </ul>

  <h2>Frequently Asked Questions</h2>
  <div class="faq">
<details class="faq-item"><summary>Does it validate JSON?</summary><p>Yes. Invalid JSON is reported with the specific line, column, and a readable message.</p></details>
<details class="faq-item"><summary>What is JSON5?</summary><p>JSON5 is a relaxed superset of JSON that also allows single-quoted strings, trailing commas, unquoted keys, and comments. Choose the JSON5 parse mode to accept these.</p></details>
<details class="faq-item"><summary>How do I write a JSONPath?</summary><p>Start with <code>$</code> for the root, then <code>.key</code> for object keys and <code>[index]</code> for array indices. Double-dot <code>$..key</code> searches recursively.</p></details>
<details class="faq-item"><summary>Is my data sent anywhere?</summary><p>No. Everything runs locally in your browser using pure JavaScript &mdash; nothing is uploaded or logged.</p></details>
  </div>
</section>
