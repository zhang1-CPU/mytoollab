<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大小写转换 - My Tool Lab</title>
    <link rel="stylesheet" href="../../_css/main.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">My Tool Lab</div>
            <ul>
                <li><a href="../../index.html">首页</a></li>
                <li><a href="../../categories/text.html">文本工具</a></li>
                <li><a href="../../pages/about.html">关于</a></li>
                <li><a href="../../pages/contact.html">联系</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="tool-container">
            <h2>大小写转换工具</h2>
            <textarea id="inputText" rows="5" placeholder="在此输入文本..."></textarea>
            <div>
                <button onclick="convertToUpperCase()">转换为大写</button>
                <button onclick="convertToLowerCase()">转换为小写</button>
                <button onclick="convertToTitleCase()">首字母大写</button>
                <button onclick="convertToSentenceCase()">句首大写</button>
            </div>
            <div class="result">
                <textarea id="outputText" rows="5" readonly placeholder="转换结果将显示在这里..."></textarea>
                <button onclick="copyToClipboard(document.getElementById('outputText').value, this)">复制结果</button>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 My Tool Lab. All rights reserved.</p>
        <nav>
            <a href="../../pages/privacy.html">隐私政策</a>
            <a href="../../pages/disclaimer.html">免责声明</a>
        </nav>
    </footer>
    <script>
        function convertToUpperCase() {
            document.getElementById('outputText').value = document.getElementById('inputText').value.toUpperCase();
        }
        function convertToLowerCase() {
            document.getElementById('outputText').value = document.getElementById('inputText').value.toLowerCase();
        }
        function convertToTitleCase() {
            const text = document.getElementById('inputText').value;
            document.getElementById('outputText').value = text.replace(/\b\w/g, char => char.toUpperCase());
        }
        function convertToSentenceCase() {
            const text = document.getElementById('inputText').value;
            document.getElementById('outputText').value = text.replace(/(^|\.\s+)([a-z])/g, (match, p1, p2) => p1 + p2.toUpperCase());
        }
        function copyToClipboard(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                element.textContent = '已复制!';
                setTimeout(() => element.textContent = '复制结果', 2000);
            });
        }
    </script>
</body>
</html>
