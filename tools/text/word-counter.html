  <style>
    :root {
      --bg: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --card: #ffffff;
      --border: #e2e8f0;
      --primary: #2563eb;
      --bg-subtle: #f8fafc;
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --card: #1e293b;
      --border: #334155;
      --primary: #60a5fa;
      --bg-subtle: rgba(255,255,255,.04);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 16px; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 24px; }
    h1 { font-size: 1.8rem; margin: 0 0 8px; color: var(--text); }
    .subtitle { color: var(--text-muted); font-size: .95rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .editor { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .editor textarea { width: 100%; min-height: 200px; padding: 16px; border: none; outline: none; resize: vertical; font-family: inherit; font-size: 1rem; line-height: 1.6; background: var(--bg); color: var(--text); box-sizing: border-box; }
    .editor textarea::placeholder { color: var(--text-muted); }
    .editor-footer { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: var(--bg-subtle); border-top: 1px solid var(--border); }
    .char-count { font-size: .8rem; color: var(--text-muted); }
    .btn { background: var(--primary); color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-size: .85rem; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .btn:hover { opacity: 0.9; }
    .btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg-subtle); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .stat-card { background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: .75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
    footer { text-align: center; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); color: var(--text-muted); font-size: .85rem; }
    footer a { color: var(--primary); }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-value { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Word Counter</h1>
    <p class="subtitle">Type or paste your text — stats update in real time.</p>
  </header>

  <div class="card">
    <div class="editor">
      <textarea id="inputText" placeholder="Type or paste your text here..." spellcheck="true"></textarea>
      <div class="editor-footer">
        <span class="char-count" id="charCount">0 characters</span>
        <button class="btn btn-secondary" id="clearBtn">Clear</button>
      </div>
    </div>

    <div class="stats-grid" style="margin-top: 20px;">
      <div class="stat-card">
        <div class="stat-value" id="wordCount">0</div>
        <div class="stat-label">Words</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="charWithSpaces">0</div>
        <div class="stat-label">Characters (with spaces)</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="charWithoutSpaces">0</div>
        <div class="stat-label">Characters (no spaces)</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="sentenceCount">0</div>
        <div class="stat-label">Sentences</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="paragraphCount">0</div>
        <div class="stat-label">Paragraphs</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="readingTime">0</div>
        <div class="stat-label">Min Read</div>
      </div>
    </div>
  </div>

  <footer>
    <p>All processing happens in your browser. <a href="/privacy.html">Privacy Policy</a></p>
  </footer>
</div>

<script>
(function() {
  'use strict';

  var input = document.getElementById('inputText');
  var wordCount = document.getElementById('wordCount');
  var charWithSpaces = document.getElementById('charWithSpaces');
  var charWithoutSpaces = document.getElementById('charWithoutSpaces');
  var sentenceCount = document.getElementById('sentenceCount');
  var paragraphCount = document.getElementById('paragraphCount');
  var readingTime = document.getElementById('readingTime');
  var charCount = document.getElementById('charCount');
  var clearBtn = document.getElementById('clearBtn');

  var WORDS_PER_MINUTE = 200;

  function countWords(text) {
    var trimmed = text.trim();
    if (!trimmed) return 0;
    var words = trimmed.split(/[\s\.\,\!\?\;\:\(\)\"]+/);
    return words.filter(function(w) { return w.length > 0; }).length;
  }

  function countSentences(text) {
    if (!text.trim()) return 0;
    var matches = text.match(/[.!?]+(?=\s|$)/g);
    return matches ? matches.length : 0;
  }

  function countParagraphs(text) {
    if (!text.trim()) return 0;
    var paras = text.split(/\n+/);
    return paras.filter(function(p) { return p.trim().length > 0; }).length;
  }

  function updateStats() {
    var text = input.value;
    var trimmed = text.trim();

    var words = countWords(text);
    var charsWith = text.length;
    var charsWithout = trimmed.replace(/\s/g, '').length;
    var sentences = countSentences(text);
    var paragraphs = countParagraphs(text);
    var readTime = Math.max(1, Math.ceil(words / WORDS_PER_MINUTE));

    wordCount.textContent = words.toLocaleString();
    charWithSpaces.textContent = charsWith.toLocaleString();
    charWithoutSpaces.textContent = charsWithout.toLocaleString();
    sentenceCount.textContent = sentences.toLocaleString();
    paragraphCount.textContent = paragraphs.toLocaleString();
    readingTime.textContent = readTime + ' min';
    charCount.textContent = charsWith.toLocaleString() + ' character' + (charsWith !== 1 ? 's' : '');
  }

  input.addEventListener('input', updateStats);
  
  clearBtn.addEventListener('click', function() {
    input.value = '';
    updateStats();
    input.focus();
  });

  updateStats();
})();
</script>

<script src="/js/theme.js"></script>
</body>
</html>
