<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum - My Tool Lab</title>
    <link rel="stylesheet" href="../../_css/main.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">My Tool Lab</div>
            <ul>
                <li><a href="../../index.html">首页</a></li>
                <li><a href="../../categories/text.html">文本工具</a></li>
                <li><a href="../../pages/about.html">关于</a></li>
                <li><a href="../../pages/contact.html">联系</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="tool-container">
            <h2>Lorem Ipsum 生成器</h2>
            <div>
                <label>段落数:</label>
                <input type="number" id="paragraphCount" value="3" min="1" max="10">
                <button onclick="generateLorem()">生成文本</button>
            </div>
            <div class="result">
                <textarea id="outputText" rows="10" readonly></textarea>
                <button onclick="copyToClipboard(document.getElementById('outputText').value, this)">复制结果</button>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 My Tool Lab. All rights reserved.</p>
        <nav>
            <a href="../../pages/privacy.html">隐私政策</a>
            <a href="../../pages/disclaimer.html">免责声明</a>
        </nav>
    </footer>
    <script>
        const loremText = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.';
        
        function generateLorem() {
            const count = parseInt(document.getElementById('paragraphCount').value) || 1;
            let result = '';
            for (let i = 0; i < count; i++) {
                result += loremText + ' ';
            }
            document.getElementById('outputText').value = result.trim();
        }
        
        function copyToClipboard(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                element.textContent = '已复制!';
                setTimeout(() => element.textContent = '复制结果', 2000);
            });
        }
        
        generateLorem();
    </script>
</body>
</html>
